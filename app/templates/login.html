<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - EL UNSITO 2.0</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        institucional: {
                            50: '#fdf3f3',
                            100: '#fbe4e4',
                            600: '#841f1f',
                            700: '#6a1616', // Tono guinda base
                            800: '#561111',
                            900: '#3d0b0b'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="flex items-center justify-center min-h-full py-12 px-4 sm:px-6 lg:px-8 bg-gradient-to-br from-institucional-700 via-institucional-800 to-institucional-900 font-sans antialiased text-slate-800">

    <div class="max-w-md w-full space-y-6">
        
        <!-- Enlace de regreso -->
        <div class="text-center">
            <a href="/" class="text-white/70 hover:text-amber-400 transition-colors text-sm font-semibold inline-flex items-center gap-1.5 group">
                <!-- Heroicons: arrow-left (Outline) -->
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 group-hover:-translate-x-1 transition-transform">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                </svg>
                Volver a la Gaceta
            </a>
        </div>

        <!-- Card de Login -->
        <div class="bg-white rounded-2xl shadow-2xl border border-slate-100 p-8 sm:p-10 relative overflow-hidden">
            <div class="absolute top-0 inset-x-0 h-1.5 bg-gradient-to-r from-amber-400 to-amber-500"></div>
            
            <div class="text-center">
                <div class="mb-6 flex justify-center">
                    <div class="bg-institucional-700 p-1.5 rounded-2xl shadow-lg inline-block overflow-hidden">
                        <img src="/static/imagenes/Logo.svg" alt="EL UNSITO 2.0" class="h-24 w-auto select-none block object-contain">
                    </div>
                </div>

                <h3 class="text-2xl font-black text-slate-900 tracking-tight">Panel de Control</h3>
                <p class="text-slate-400 text-sm font-medium mt-1 mb-6">Autenticación Privada Administrativa</p>

                <!-- Alerta de Error -->
                <div id="error-alert" class="hidden flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-2.5 rounded-xl mb-6 text-left shadow-sm" role="alert">
                    <!-- Heroicons: exclamation-triangle (Solid) -->
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 flex-shrink-0">
                        <path fill-rule="evenodd" d="M9.401 3.003c1.155-2 4.043-2 5.197 0l7.355 12.748c1.154 2-.29 4.5-2.599 4.5H4.645c-2.309 0-3.752-2.5-2.598-4.5L9.401 3.003ZM12 8.25a.75.75 0 0 1 .75.75v3.75a.75.75 0 0 1-1.5 0V9a.75.75 0 0 1 .75-.75Zm0 8.25a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z" clip-rule="evenodd" />
                    </svg>
                    <span class="font-medium">Credenciales incorrectas. Intenta de nuevo.</span>
                </div>

                <!-- Formulario -->
                <form action="/login" method="POST" class="space-y-5 text-left">
                    
                    <!-- Campo: Usuario -->
                    <div>
                        <label for="usuario" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Usuario</label>
                        <div class="flex rounded-xl shadow-sm border border-slate-200 focus-within:border-institucional-700 focus-within:ring-2 focus-within:ring-institucional-100 transition-all overflow-hidden group">
                            <span class="inline-flex items-center px-4 bg-slate-50 border-r border-slate-200 text-slate-400 group-focus-within:text-institucional-700 transition-colors">
                                <!-- Heroicons: user (Outline) -->
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                                </svg>
                            </span>
                            <input type="text" id="usuario" name="usuario" required placeholder="Ej. admin" autocomplete="off"
                                   class="block w-full px-4 py-3 text-slate-900 bg-white placeholder-slate-400 focus:outline-none text-sm font-medium">
                        </div>
                    </div>

                    <!-- Campo: Contraseña -->
                    <div>
                        <label for="password" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Contraseña</label>
                        <div class="flex rounded-xl shadow-sm border border-slate-200 focus-within:border-institucional-700 focus-within:ring-2 focus-within:ring-institucional-100 transition-all overflow-hidden group">
                            <span class="inline-flex items-center px-4 bg-slate-50 border-r border-slate-200 text-slate-400 group-focus-within:text-institucional-700 transition-colors">
                                <!-- Heroicons: key (Outline) -->
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 0 1 3 3m3 0a6 6 0 0 1-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1 1 21.75 8.25Z" />
                                </svg>
                            </span>
                            <input type="password" id="password" name="password" required placeholder="••••••••"
                                   class="block w-full px-4 py-3 text-slate-900 bg-white placeholder-slate-400 focus:outline-none text-sm">
                        </div>
                    </div>

                    <!-- Botón de Envío -->
                    <div class="pt-2">
                        <button type="submit" class="w-full flex justify-center items-center gap-2 bg-institucional-700 hover:bg-institucional-800 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-institucional-900/20 transform active:scale-[0.98] transition-all tracking-wide text-sm uppercase">
                            <!-- Heroicons: arrow-right-on-rectangle (Solid) -->
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                                <path fill-rule="evenodd" d="M12 2.25a.75.75 0 0 1 .75.75v9a.75.75 0 0 1-1.5 0V3a.75.75 0 0 1 .75-.75ZM6.162 5.73a.75.75 0 0 1 .029 1.06 8.25 8.25 0 1 0 11.618 0 .75.75 0 1 1 1.06-1.06 9.75 9.75 0 1 1-13.736 0 .75.75 0 0 1 1.029-.03Z" clip-rule="evenodd" />
                                <path fill-rule="evenodd" d="M12 7.5a.75.75 0 0 1 .75.75v3.75a.75.75 0 0 1-1.5 0V8.25A.75.75 0 0 1 12 7.5Z" opacity="0.1" /> <!-- Pequeño truco para complementar diseño si fuera necesario -->
                            </svg>
                            Ingresar al Panel
                        </button>
                    </div>

                </form>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center">
            <p class="text-xs text-white/50 font-medium tracking-wide">&copy; 2026 Gaceta Universitaria &bull; UNSIS</p>
        </div>

    </div>

    <!-- Script para control de errores en la URL -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === 'true') {
            document.getElementById('error-alert').classList.remove('hidden');
        }
    </script>
</body>
</html>
