<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Noticia - EL UNSITO 2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/admin/dashboard">
                <i class="bi bi-shield-lock-fill me-2"></i>EL UNSITO 2.0 Admin
            </a>
            <a href="/admin/dashboard" class="btn btn-outline-light btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Volver al Panel
            </a>
        </div>
    </nav>

    <div class="container my-5" style="max-width: 800px;">
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white py-3">
                <h4 class="m-0 fw-bold"><i class="bi bi-journal-plus me-2"></i>Publicar Nueva Noticia</h4>
            </div>
            <div class="card-body p-4">
                <form action="/admin/crear" method="POST" enctype="multipart/form-data">
                    
                    <div class="mb-3">
                        <label for="titulo" class="form-label fw-semibold">Título de la Noticia</label>
                        <input type="text" class="form-control form-control-lg" id="titulo" name="titulo" placeholder="Escribe un título llamativo..." required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="seccion_id" class="form-label fw-semibold">Sección Editorial</label>
                            <select class="form-select" id="seccion_id" name="seccion_id" required>
                                <option value="" selected disabled>Selecciona una sección...</option>
                                {% for seccion in secciones %}
                                    <option value="{{ seccion.id }}">{{ seccion.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="imagen" class="form-label fw-semibold">Subir Imagen de Portada</label>
                            <input type="file" class="form-control" id="imagen" name="imagen" accept="image/png, image/jpeg, image/jpg" required>
                            <div class="form-text">Formatos permitidos: PNG, JPG o JPEG.</div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="contenido" class="form-label fw-semibold">Cuerpo de la Noticia</label>
                        <textarea class="form-control" id="contenido" name="contenido" rows="8" placeholder="Escribe todo el contenido de la publicación aquí..." required></textarea>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="/admin/dashboard" class="btn btn-light border px-4">Cancelar</a>
                        <button type="submit" class="btn btn-primary px-5 fw-bold">
                            <i class="bi bi-cloud-arrow-up-fill me-2"></i>Publicar Noticia
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
