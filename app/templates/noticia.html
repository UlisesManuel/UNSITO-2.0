<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ noticia.titulo }} - EL UNSITO 2.0</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        institucional: {
                            50: '#fdf3f3',
                            100: '#fbe4e4',
                            600: '#841f1f',
                            700: '#6a1616', 
                            800: '#561111',
                            900: '#3d0b0b'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="flex flex-col min-h-full font-sans antialiased text-slate-800">

    <!-- Barra de Navegación Premium e Institucional -->
    <nav class="bg-institucional-700 text-white shadow-md sticky top-0 z-50 border-b border-institucional-800 py-3">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between">
                
                <!-- Contenedor del Logo de la Gaceta -->
                <div class="flex-shrink-0 flex items-center">
                    <a class="flex items-center" href="/">
                        <img src="/static/imagenes/Logo.svg" alt="EL UNSITO 2.0" class="h-14 w-auto select-none block">
                    </a>
                </div>
                
                <!-- Menú de Navegación (Escritorio) -->
                <div class="hidden md:flex items-center gap-8 font-bold text-sm tracking-wide">
                    <a class="hover:text-amber-300 transition-colors py-2 border-b-2 border-transparent hover:border-amber-400" href="/seccion/academia">Academia</a>
                    <a class="hover:text-amber-300 transition-colors py-2 border-b-2 border-transparent hover:border-amber-400" href="/seccion/cultura">Cultura</a>
                    <a class="hover:text-amber-300 transition-colors py-2 border-b-2 border-transparent hover:border-amber-400" href="/seccion/deportes">Deportes</a>
                    <a class="hover:text-amber-300 transition-colors py-2 border-b-2 border-transparent hover:border-amber-400" href="/seccion/avisos-oficiales">Avisos</a>
                    
                    <a class="ml-2 bg-white/10 hover:bg-white text-white hover:text-institucional-700 border border-white/20 hover:border-white transition-all px-4 py-2 rounded-xl text-xs uppercase font-extrabold tracking-wider flex items-center gap-2 shadow-sm" href="/login">
                        <!-- Heroicons -->
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
                            <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM3.751 20.105a8.25 8.25 0 0 1 16.498 0 .75.75 0 0 1-.437.695A18.683 18.683 0 0 1 12 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 0 1-.437-.695Z" clip-rule="evenodd" />
                        </svg>
                        Admin
                    </a>
                </div>

                <!-- Botón de Menú Móvil -->
                <div class="md:hidden">
                    <button type="button" class="text-white hover:text-amber-300 p-2 rounded-lg hover:bg-white/5 transition-colors" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
                        <!-- Heroicons: bars-3 (Outline) -->
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Menú Desplegable Móvil -->
        <div id="mobile-menu" class="hidden md:hidden bg-institucional-800 px-4 pt-2 pb-4 space-y-2 border-t border-institucional-600 mt-2">
            <a class="block hover:text-amber-300 py-2 font-medium" href="/seccion/academia">Academia</a>
            <a class="block hover:text-amber-300 py-2 font-medium" href="/seccion/cultura">Cultura</a>
            <a class="block hover:text-amber-300 py-2 font-medium" href="/seccion/deportes">Deportes</a>
            <a class="block hover:text-amber-300 py-2 font-medium" href="/seccion/avisos-oficiales">Avisos</a>
            <a class="inline-flex items-center gap-1.5 bg-white text-institucional-700 px-4 py-2 rounded-lg font-bold w-full justify-center mt-2 text-sm uppercase" href="/login">
                <!-- Heroicons: user (Solid) -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
                    <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM3.751 20.105a8.25 8.25 0 0 1 16.498 0 .75.75 0 0 1-.437.695A18.683 18.683 0 0 1 12 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 0 1-.437-.695Z" clip-rule="evenodd" />
                </svg>
                Admin
            </a>
        </div>
    </nav>

    <!-- Contenido Principal del Artículo -->
    <main class="flex-grow max-w-4xl w-full mx-auto px-4 sm:px-6 lg:px-8 my-8">
        
        <!-- Botón Regresar -->
        <div class="mb-5">
            <a href="/" class="inline-flex items-center gap-1.5 bg-white hover:bg-slate-100 text-slate-600 hover:text-slate-900 border border-slate-200 shadow-sm rounded-xl px-4 py-2 text-sm font-semibold transition-all group">
                <!-- Heroicons: arrow-left (Outline) -->
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 group-hover:-translate-x-1 transition-transform">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                </svg>
                Regresar a Inicio
            </a>
        </div>

        <!-- Tarjeta de la Nota -->
        <article class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden p-6 sm:p-10 md:p-12">
            
            <header class="mb-6">
                <!-- Sección/Categoría de la Nota -->
                <span class="inline-block bg-institucional-100 text-institucional-700 font-extrabold text-xs tracking-wider uppercase px-3 py-1.5 rounded-lg mb-4">
                    {{ noticia.seccion.nombre }}
                </span>
                
                <!-- Título -->
                <h1 class="text-3xl sm:text-4xl md:text-5xl font-black text-slate-900 tracking-tight leading-tight mb-4">
                    {{ noticia.titulo }}
                </h1>
                
                <!-- Metainformación (Visitas y Gaceta) -->
                <div class="flex flex-wrap items-center gap-4 text-slate-400 text-xs sm:text-sm font-semibold border-b border-slate-100 pb-4">
                    <span class="flex items-center gap-1.5 bg-slate-50 px-2.5 py-1 rounded-md text-slate-500">
                        <!-- Heroicons: eye (Solid) -->
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4 text-slate-400">
                            <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" />
                            <path fill-rule="evenodd" d="M1.323 11.447C2.811 6.976 7.028 3.75 12.001 3.75c4.97 0 9.185 3.223 10.675 7.69.12.362.12.752 0 1.113-1.487 4.466-5.704 7.69-10.674 7.69-4.97 0-9.186-3.223-10.675-7.69a1.762 1.762 0 0 1 0-1.113ZM17.25 12a5.25 5.25 0 1 1-10.5 0 5.25 5.25 0 0 1 10.5 0Z" clip-rule="evenodd" />
                        </svg>
                        {{ noticia.visitas }} visitas registradas
                    </span>
                    <span class="flex items-center gap-1.5">
                        <!-- Heroicons: academic-cap (Solid) -->
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4 text-slate-400">
                            <path d="M11.7 2.805a.75.75 0 0 1 .6 0l7.75 3.224a.75.75 0 0 1 0 1.385L12.3 10.638a.75.75 0 0 1-.6 0L3.95 7.414a.75.75 0 0 1 0-1.385L11.7 2.805Z" />
                            <path d="M21.375 11.75a.75.75 0 0 1 .75-.75h.75a.75.75 0 0 1 .75.75v3a.75.75 0 0 1-1.5 0v-2.25H22.125a.75.75 0 0 1-.75-.75Z" />
                            <path d="M4.5 11.75a.75.75 0 0 1 .75-.75h.75a.75.75 0 0 1 .75.75v2.987c0 1.096.333 2.165.956 3.07l.31.451a.75.75 0 1 1-1.248.832l-.31-.451A5.205 5.205 0 0 1 4.5 14.737v-2.987Z" />
                            <path fill-rule="evenodd" d="M12 11.94 5.43 9.212a5.214 5.214 0 0 0-.18 1.965c0 1.83 1.02 3.473 2.613 4.27l3.628 1.815a1.25 1.25 0 0 0 1.118 0l3.628-1.815a4.773 4.773 0 0 0 2.613-4.27c0-.684-.131-1.346-.37-1.954L12 11.94Z" clip-rule="evenodd" />
                        </svg>
                        Gaceta UNSIS
                    </span>
                </div>
            </header>

            <!-- Imagen de Portada -->
            <div class="mb-6 rounded-2xl overflow-hidden shadow-md max-h-[480px] bg-slate-100 border border-slate-100">
                <img src="{{ noticia.imagen_url }}" alt="Imagen de portada" class="w-full h-full object-cover object-center max-h-[480px] hover:scale-[1.01] transition-transform duration-500">
            </div>

            <!-- Cuerpo del Contenido -->
            <div class="text-slate-800 text-lg sm:text-xl leading-relaxed tracking-normal whitespace-pre-line font-normal font-serif">
                {{ noticia.contenido }}
            </div>
            
        </article>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-6 border-t border-slate-800">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-xs font-medium tracking-wide">&copy; 2026 EL UNSITO 2.0 &bull; Universidad de la Sierra Sur</p>
        </div>
    </footer>

</body>
</html>
