<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Noticia - EL UNSITO 2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/admin/dashboard">
                <i class="bi bi-shield-lock-fill me-2"></i>EL UNSITO 2.0 Admin
            </a>
            <a href="/admin/dashboard" class="btn btn-outline-light btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Volver al Panel
            </a>
        </div>
    </nav>

    <div class="container my-5" style="max-width: 800px;">
        <div class="card shadow border-0">
            <div class="card-header bg-warning text-dark py-3">
                <h4 class="m-0 fw-bold"><i class="bi bi-pencil-square me-2"></i>Modificar Publicación</h4>
            </div>
            <div class="card-body p-4">
                <form action="/admin/editar/{{ noticia.id }}" method="POST" enctype="multipart/form-data">
                    
                    <div class="mb-3">
                        <label for="titulo" class="form-label fw-semibold">Título de la Noticia</label>
                        <input type="text" class="form-control form-control-lg" id="titulo" name="titulo" value="{{ noticia.titulo }}" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="seccion_id" class="form-label fw-semibold">Sección Editorial</label>
                            <select class="form-select" id="seccion_id" name="seccion_id" required>
                                {% for seccion in secciones %}
                                    <option value="{{ seccion.id }}" {% if seccion.id == noticia.seccion_id %}selected{% endif %}>
                                        {{ seccion.nombre }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="imagen" class="form-label fw-semibold">Reemplazar Imagen (Opcional)</label>
                            <input type="file" class="form-control" id="imagen" name="imagen" accept="image/png, image/jpeg, image/jpg">
                            <div class="form-text text-muted">Deja este campo vacío si deseas conservar la imagen actual.</div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="contenido" class="form-label fw-semibold">Cuerpo de la Noticia</label>
                        <textarea class="form-control" id="contenido" name="contenido" rows="8" required>{{ noticia.contenido }}</textarea>
                    </div>

                    <div class="mb-4 text-center">
                        <p class="form-label fw-semibold text-start">Miniatura Actual:</p>
                        <img src="{{ noticia.imagen_url }}" alt="Vista previa" class="img-thumbnail rounded object-fit-cover" style="max-height: 150px;">
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="/admin/dashboard" class="btn btn-light border px-4">Cancelar</a>
                        <button type="submit" class="btn btn-warning px-5 fw-bold">
                            <i class="bi bi-check-circle-fill me-2"></i>Guardar Cambios
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
