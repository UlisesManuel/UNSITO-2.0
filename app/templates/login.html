<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - EL UNSITO 2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            /* Degradado moderno con los colores de la app */
            background: linear-gradient(135deg, #0d6efd 0%, #0a46a3 100%);
            min-vh-100: 100vh;
        }
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
        }
        .form-control {
            border-left: none;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }
        .input-group:focus-within .input-group-text {
            border-color: #0d6efd;
            color: #0d6efd;
        }
        .input-group:focus-within .form-control {
            border-color: #0d6efd;
        }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100 py-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                
                <div class="text-center mb-3">
                    <a href="/" class="text-white-50 text-decoration-none small fw-semibold">
                        <i class="bi bi-arrow-left me-1"></i> Volver a la Gaceta
                    </a>
                </div>

                <div class="card login-card bg-white p-4">
                    <div class="card-body text-center">
                        
                        <div class="mb-3">
                            <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 70px; height: 70px;">
                                <i class="bi bi-shield-lock-fill fs-2"></i>
                            </div>
                        </div>

                        <h3 class="fw-bold text-dark mb-1">EL UNSITO <span class="fs-5 text-muted">2.0</span></h3>
                        <p class="text-muted small mb-4">Panel de Administración Privado</p>

                        <div id="error-alert" class="alert alert-danger d-none small py-2" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i> Credenciales incorrectas.
                        </div>

                        <form action="/login" method="POST" class="text-start">
                            
                            <div class="mb-3">
                                <label for="usuario" class="form-label small fw-semibold text-secondary">Usuario</label>
                                <div class="input-group">
                                    <span class="input-group-text text-muted"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control" id="usuario" name="usuario" placeholder="Ej. admin" required autocomplete="off">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label small fw-semibold text-secondary">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text text-muted"><i class="bi bi-key"></i></span>
                                    <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                                </div>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary py-2 fw-bold shadow-sm">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar al Panel
                                </button>
                            </div>

                        </form>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <p class="m-0 small text-white-50">&copy; 2026 Gaceta Universitaria</p>
                </div>

            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === 'true') {
            document.getElementById('error-alert').classList.remove('d-none');
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
