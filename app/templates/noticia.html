<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ noticia.titulo }} - EL UNSITO 2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="/">
                <i class="bi bi-newspaper me-2"></i>EL UNSITO <span class="badge bg-warning text-dark fs-6 align-middle">2.0</span>
            </a>
        </div>
    </nav>

    <div class="container my-5" style="max-width: 900px;">
        <div class="mb-4">
            <a href="/" class="btn btn-light border btn-sm text-secondary fw-semibold">
                <i class="bi bi-arrow-left me-1"></i>Regresar a Inicio
            </a>
        </div>

        <article class="card shadow border-0 overflow-hidden bg-white p-4 p-md-5">
            <header class="mb-4">
                <span class="badge bg-secondary px-3 py-2 mb-2 text-uppercase">{{ noticia.seccion.nombre }}</span>
                <h1 class="fw-bold display-5 text-dark mb-3">{{ noticia.titulo }}</h1>
                <div class="text-muted small d-flex align-items-center gap-3 border-bottom pb-3">
                    <span><i class="bi bi-eye-fill me-1"></i>{{ noticia.visitas }} visitas registradas</span>
                    <span><i class="bi bi-building me-1"></i>Gaceta UNSIS</span>
                </div>
            </header>

            <div class="mb-4 text-center">
                <img src="{{ noticia.imagen_url }}" alt="Imagen de portada" class="img-fluid rounded shadow-sm w-100 object-fit-cover" style="max-height: 480px;">
            </div>

            <div class="fs-5 text-dark lh-base" style="white-space: pre-line;">
                {{ noticia.contenido }}
            </div>
        </article>
    </div>

    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p class="m-0 small text-secondary">&copy; 2026 EL UNSITO 2.0</p>
        </div>
    </footer>

</body>
</html>
