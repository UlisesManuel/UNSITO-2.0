<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Noticia - EL UNSITO 2.0</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        institucional: {
                            50: '#fdf3f3',
                            100: '#fbe4e4',
                            600: '#841f1f',
                            700: '#6a1616', 
                            800: '#561111',
                            900: '#3d0b0b'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="flex flex-col min-h-full font-sans antialiased text-slate-800">

    <nav class="bg-slate-900 text-white shadow border-b border-slate-950 py-3">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 flex items-center justify-between">
            
            <!-- Logo Oficial de El Unsito 2.0 -->
            <a class="flex items-center transition-opacity hover:opacity-90" href="/admin/dashboard" title="Inicio Panel">
                <img src="/static/imagenes/Logo.svg" alt="EL UNSITO 2.0" class="h-12 w-auto select-none block">
            </a>
            
            <a href="/admin/dashboard" class="inline-flex items-center gap-1.5 text-xs font-bold uppercase tracking-wider text-slate-400 hover:text-white border border-slate-700 hover:border-slate-500 bg-slate-800/50 px-3 py-2 rounded-xl transition-all">
                <!-- Heroicons: arrow-left (Outline) -->
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3.5 h-3.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                </svg>
                Volver al Panel
            </a>
        </div>
    </nav>

    <!-- Contenedor Principal del Formulario -->
    <main class="flex-grow max-w-4xl w-full mx-auto px-4 sm:px-6 my-10">
        <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
            
            <!-- Encabezado del Formulario -->
            <div class="bg-institucional-700 px-6 py-5 text-white flex items-center gap-3">
                <div class="bg-white/10 p-2 rounded-xl">
                    <!-- Heroicons: document-plus (Outline) -->
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 text-amber-300">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-lg font-black tracking-wide uppercase">Publicar Nueva Noticia</h1>
                    <p class="text-institucional-100 text-xs">Completa los campos para lanzar la nota en la gaceta digital.</p>
                </div>
            </div>

            <!-- Formulario de Creación -->
            <form action="/admin/crear" method="POST" enctype="multipart/form-data" class="p-6 sm:p-8 space-y-6">
                
                <!-- Título de la Noticia -->
                <div>
                    <label for="titulo" class="block text-sm font-bold text-slate-700 uppercase tracking-wider mb-2">Título de la Noticia</label>
                    <input type="text" id="titulo" name="titulo" placeholder="Escribe un título llamativo e impactante..." required
                        class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3.5 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-institucional-600 focus:border-transparent focus:bg-white font-semibold transition-all shadow-inner">
                </div>

                <!-- Fila: Sección Editorial e Imagen de Portada -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <!-- Selección de Sección -->
                    <div>
                        <label for="seccion_id" class="block text-sm font-bold text-slate-700 uppercase tracking-wider mb-2">Sección Editorial</label>
                        <div class="relative">
                            <select id="seccion_id" name="seccion_id" required
                                class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3.5 text-slate-900 focus:outline-none focus:ring-2 focus:ring-institucional-600 focus:border-transparent focus:bg-white font-medium transition-all shadow-inner appearance-none">
                                <option value="" selected disabled>Selecciona una sección...</option>
                                {% for seccion in secciones %}
                                    <option value="{{ seccion.id }}">{{ seccion.nombre }}</option>
                                {% endfor %}
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                                <!-- Heroicons: chevron-down (Outline) -->
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
                                </svg>
                            </div>
                        </div>
                    </div>

                    <!-- Input de Archivo (Imagen) -->
                    <div>
                        <label for="imagen" class="block text-sm font-bold text-slate-700 uppercase tracking-wider mb-2">Imagen de Portada</label>
                        <input type="file" id="imagen" name="imagen" accept="image/png, image/jpeg, image/jpg" required onchange="previewImage(event)"
                            class="w-full bg-slate-50 border border-slate-200 rounded-2xl text-slate-500 file:mr-4 file:py-3.5 file:px-4 file:rounded-l-2xl file:border-0 file:text-xs file:font-extrabold file:uppercase file:tracking-wider file:bg-slate-200 file:text-slate-700 hover:file:bg-slate-300 focus:outline-none focus:ring-2 focus:ring-institucional-600 font-medium transition-all cursor-pointer shadow-inner">
                        <p class="text-xs text-slate-400 mt-1.5 pl-1">Formatos admitidos: PNG, JPG o JPEG.</p>
                    </div>
                </div>

                <!-- Contenedor dinámico para Vista Previa de Imagen -->
                <div id="preview-container" class="hidden border border-dashed border-slate-200 rounded-3xl p-3 bg-slate-50/50">
                    <span class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 pl-1">Vista previa del archivo seleccionado:</span>
                    <img id="image-preview" src="#" alt="Vista previa" class="max-h-64 w-full object-cover rounded-2xl">
                </div>

                <!-- Cuerpo de la Noticia -->
                <div>
                    <label for="contenido" class="block text-sm font-bold text-slate-700 uppercase tracking-wider mb-2">Cuerpo de la Noticia</label>
                    <textarea id="contenido" name="contenido" rows="9" placeholder="Escribe la redacción íntegra de la publicación aquí..." required
                        class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-4 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-institucional-600 focus:border-transparent focus:bg-white font-medium transition-all shadow-inner leading-relaxed"></textarea>
                </div>

                <!-- Botones de Acción inferior -->
                <div class="flex flex-col-reverse sm:flex-row sm:justify-end gap-3 pt-4 border-t border-slate-100">
                    <a href="/admin/dashboard" 
                        class="inline-flex items-center justify-center font-bold text-sm text-slate-500 hover:text-slate-700 bg-slate-100 hover:bg-slate-200 px-6 py-3 rounded-2xl transition-colors">
                        Cancelar
                    </a>
                    <button type="submit" 
                        class="inline-flex items-center justify-center gap-2 bg-institucional-600 hover:bg-institucional-700 text-white font-black text-sm uppercase tracking-wider px-8 py-3 rounded-2xl shadow-md shadow-institucional-600/10 hover:shadow-lg transition-all">
                        <!-- Heroicons: cloud-arrow-up (Solid) -->
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
                            <path fill-rule="evenodd" d="M10.5 3.75a6 6 0 0 0-5.98 6.496A5.25 5.25 0 0 0 6.75 20.25H18a4.5 4.5 0 0 0 2.206-8.423 3.75 3.75 0 0 0-5.025-4.341l-.538.214-.127-.54a5.25 5.25 0 0 0-10.273-1.09l-.112.484-.486-.12A6 6 0 0 0 10.5 3.75Zm.75 8.62v3.38a.75.75 0 1 1-1.5 0v-3.38l-1.47 1.47a.75.75 0 1 1-1.06-1.06l2.75-2.75a.75.75 0 0 1 1.06 0l2.75 2.75a.75.75 0 1 1-1.06 1.06l-1.47-1.47Z" clip-rule="evenodd" />
                        </svg>
                        Publicar Noticia
                    </button>
                </div>

            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-500 py-5 border-t border-slate-950 mt-auto">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <p class="text-xs font-semibold tracking-wide">&copy; 2026 EL UNSITO 2.0 &bull; Panel de Control Administrativo</p>
        </div>
    </footer>

    <!-- Script de control para la vista previa de la imagen -->
    <script>
    function previewImage(event) {
        const file = event.target.files[0];
        const container = document.getElementById('preview-container');
        const imagePreview = document.getElementById('image-preview');        
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                imagePreview.src = e.target.result;
                container.classList.remove('hidden');
            }
            reader.readAsDataURL(file);
        } else {
            container.classList.add('hidden');
        }
    }
    </script>

</body>
</html>
